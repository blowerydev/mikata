name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r --filter='./packages/*' build

      - run: pnpm --filter @mikata/docs build

      - uses: actions/configure-pages@v5
        # `enablement: true` turns Pages on with "GitHub Actions" as the
        # source the first time the workflow runs. Without it the action
        # 404s for repos that haven't been set up manually via Settings →
        # Pages. No-op once Pages is already enabled.
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist/static

      - id: deployment
        uses: actions/deploy-pages@v4
