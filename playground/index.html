<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mikata Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #1a1a2e; color: #eee; }
    h1:not([class*="mkt-"]) { margin-bottom: 1rem; color: #e94560; }
    h2:not([class*="mkt-"]) { margin: 1.5rem 0 0.5rem; color: #0f3460; background: #e94560; padding: 0.25rem 0.75rem; border-radius: 4px; display: inline-block; }
    h3:not([class*="mkt-"]) { margin: 1rem 0 0.5rem; color: #e94560; }
    button:not([class*="mkt-"]) { padding: 0.5rem 1rem; border: none; border-radius: 4px; background: #e94560; color: white; cursor: pointer; font-size: 1rem; margin: 0.25rem; }
    button:not([class*="mkt-"]):hover { background: #c73e54; }
    input:not([class*="mkt-"]) { padding: 0.5rem; border: 1px solid #333; border-radius: 4px; background: #16213e; color: #eee; font-size: 1rem; margin: 0.25rem; }
    .card { background: #16213e; border-radius: 8px; padding: 1rem; margin: 0.5rem 0; }
    .todo-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; }
    .done { text-decoration: line-through; opacity: 0.5; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
